<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM</title>
</head>
<body>
    <h2 id="title">Hello, Javascript!!</h2>

    <script>
        let title = document.getElementById('title');

        console.log(title.innerText);

        title.innerText = '야, 바꿔~~';
    </script>

    <button onclick="greeting()">클릭</button>
    <button ondblclick="changeText()">변경</button>

    <h2 id="msg">어서오세요~</h2>

    <script>
        function greeting(){
            alert('안녕하세요~!');
        }

        function changeText(){
            document.getElementById("msg").innerText = '또 오세요~~~';
        }
    </script>
</body>
</html>
