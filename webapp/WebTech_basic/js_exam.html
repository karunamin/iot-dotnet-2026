<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 학습</title>
    <link rel="stylesheet" href="./site.css">
    <script>
        /* 여러줄 주석 */
        // alert("Hello, Javascript!"); // 한줄 주석
    </script>
</head>
<body>
    <h2>Javascript 학습</h2>

    <script>
        // 변수 - 타입지정이 없음. python과 동일
        let name="홍길동";
        let age = 30;

        console.log(name);
        console.log(age);
        // alert(name + " " + age); // alert으로도 가능 alert + debuging => alerging        
    </script>

    <script>
        // 연산자 - Pass! 나머지 프로그래밍 언어와 동일
        let a = 10; 
        let b = 3;

        console.log(a % b); // 1
    </script>

    <script> 
        // 조건문, if, switch 문 
        if (age >= 19) {
            console.log("성인");
        } else {
            console.log("미성년자");
        }        
    </script>

    <script>
        // 반복문 for, while
        // let c = 1;
        // while (1) {
        //     console.log(c);
        //     c++;
        // }
        for (let i = 1; i <= 5; i++) {
            console.log(i);
        }
    </script>

    <script>
        // 함수
        function add(a, b) {
            return a + b;
        }

        let result = add(a, b);
        console.log(result);

        // 익명함수, lamdba함수
    </script>

    <script>
        // 배열, 문자열 사용법 Python 동일
        // 홑따옴표(single quatation) 사용할 것
        let fruits = [
            '애플망고',
            "사과",
            "바나나",
            '포도'
        ];
        console.log(fruits);
    </script>

    <script>
        // 객체(Object) --> JSON이다!!!
        let student = {
            name: '홍길동',
            age: 30,
            score: 90,
            graduated: false
        }

        console.log(student);
    </script>

</body>
</html>
